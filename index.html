<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CCTV SCANNER</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#000000">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<header>

<h1>🌍 CCTV SCANNER</h1>

<button id="installBtn" class="install-btn">Install App</button>

</header>

<main>

<div class="controls">

<input id="urlInput" placeholder="Masukkan URL halaman webcam">

<button onclick="scanPage()">Scan Halaman</button>

<button onclick="scanDefault()">Scan Website Kamera</button>

<button onclick="exportJSON()">Export JSON</button>

<button onclick="exportM3U()">Export Playlist</button>

</div>

<div id="status"></div>

<section id="results"></section>

<section class="player">

<video id="video" controls autoplay playsinline></video>

</section>

</main>

<script src="app.js"></script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}
</script>

</body>
</html>
